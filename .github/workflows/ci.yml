name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Poetry
        run: pipx install poetry
        
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          
      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi
        
      - name: Run tests
        run: |
          poetry run pytest -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing
          
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Poetry
        run: pipx install poetry
        
      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi
        
      - name: Format check (Black)
        run: poetry run black --check --diff .
        
      - name: Import sorting (isort)
        run: poetry run isort --check-only --diff .
        
      - name: Linting (Ruff)
        run: poetry run ruff check . --output-format=github
        
      - name: Type checking (MyPy)
        run: poetry run mypy --show-error-codes --pretty
        
      - name: Security scan (Bandit)
        run: poetry run bandit -r src/ -f json -o bandit-report.json || true
        
      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Poetry
        run: pipx install poetry
        
      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi
        
      - name: Run performance benchmarks
        run: |
          poetry run python -c "
          from icat_notebook_runner import run_safe
          import time
          
          def benchmark_test():
              return sum(range(10000))
          
          # Run multiple iterations for stable results
          times = []
          for _ in range(5):
              start = time.perf_counter()
              result = run_safe(benchmark_test, timeout=10)
              end = time.perf_counter()
              if result.success:
                  times.append((end - start) * 1000)
          
          if times:
              avg_time = sum(times) / len(times)
              print(f'✅ Average execution time: {avg_time:.2f}ms')
              print(f'✅ All {len(times)} benchmark runs successful')
              
              # Performance regression check
              if avg_time > 1000:  # 1 second threshold
                  print('⚠️  Performance regression detected!')
                  exit(1)
          else:
              print('❌ All benchmark runs failed')
              exit(1)
          "

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, quality]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Poetry
        run: pipx install poetry
        
      - name: Build package
        run: poetry build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, quality, build]
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Poetry
        run: pipx install poetry
        
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
          
      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish --no-interaction
